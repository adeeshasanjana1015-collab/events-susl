{% extends "base.html" %}
{% block title %}Admin Login — Events.SUSL{% endblock %}
{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="form-card p-4 text-center">
                    <div class="mb-3">
                        <i class="bi bi-shield-lock display-4 text-primary"></i>
                    </div>
                    <h4 class="fw-bold">Admin Login</h4>
                    <p class="text-muted small">Events.SUSL Management Portal</p>
                    <form method="POST" class="text-start">
                        <div class="mb-3">
                            <label class="form-label fw-semibold small">Email</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" name="email" class="form-control" placeholder="admin@gmail.com" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold small">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-key"></i></span>
                                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100"><i class="bi bi-box-arrow-in-right me-1"></i>Login</button>
                    </form>
                    <p class="mt-3 small text-muted mb-0">Default: admin@gmail.com / admin123</p>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
